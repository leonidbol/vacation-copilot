# Evaluation configuration for Vacation Copilot
#
# Run with: agents-cli eval run
# Or two-step: agents-cli eval generate && agents-cli eval grade

datasets:
  - datasets/onboarding-dataset.json
  - datasets/basic-dataset.json

metrics:
  - response_evaluation_score
  - general_quality